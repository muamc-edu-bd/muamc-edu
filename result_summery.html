<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Result Summary — Moinuddin Adarsha Mohila College</title>
  <meta name="description" content="Academic result summary for Moinuddin Adarsha Mohila College students. Scan QR code to view result.">
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #0d2b45; --navy2: #174070; --gold: #a97c28; --gold2: #c9973a;
      --red: #b91c1c; --green: #166534; --border: #d1d5db; --muted: #6b7280;
      --bg: #f0f4f8; --white: #fff;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      padding: 20px 16px 40px;
    }

    /* ── Loading / Error states ── */
    #state-loading, #state-error { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; gap: 16px; }
    .spinner { width: 48px; height: 48px; border: 4px solid #ddd; border-top-color: var(--navy); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .state-txt { font-size: 1rem; color: var(--muted); font-weight: 500; }
    .err-icon { font-size: 3rem; }
    .err-msg { font-size: 1rem; color: var(--red); font-weight: 600; text-align: center; max-width: 360px; }
    .err-sub { font-size: .85rem; color: var(--muted); text-align: center; max-width: 360px; line-height: 1.5; }

    /* ── Result Card ── */
    #state-result { display: none; width: 100%; max-width: 820px; }

    .rc-page {
      background: var(--white);
      padding: 10mm 12mm;
      box-shadow: 0 4px 24px rgba(0,0,0,.12);
      font-family: 'Times New Roman', serif;
      font-size: 11pt;
    }

    /* College Header */
    .rc-college-hdr { display: grid; grid-template-columns: 110px 1fr 130px; align-items: center; gap: 8px; margin-bottom: 6px; padding-bottom: 8px; border-bottom: 2.5px solid #000; }
    .rc-col-left { display: flex; flex-direction: column; align-items: center; gap: 3px; }
    .rc-stu-photo { width: 90px; height: 112px; object-fit: cover; border: 2px solid #444; display: block; }
    .rc-stu-photo-ph { width: 90px; height: 112px; border: 2px solid #ccc; background: #f5f5f5; display: flex; align-items: center; justify-content: center; font-size: 8pt; color: #888; text-align: center; line-height: 1.4; }
    .rc-stu-photo-lbl { font-size: 7pt; color: #666; text-align: center; margin-top: 2px; }
    .rc-col-mid { text-align: center; }
    .rc-col-mid h1 { font-size: 14pt; font-weight: 700; color: #000; letter-spacing: .3px; margin-bottom: 2px; line-height: 1.2; }
    .rc-college-logo { width: 76px; height: 76px; border-radius: 50%; object-fit: contain; border: 1.5px solid #ccc; display: block; margin: 4px auto; }
    .rc-col-mid p { font-size: 9pt; color: #333; margin-bottom: 1px; }
    .transcript-lbl { font-size: 12pt; font-weight: 700; margin-top: 5px; display: block; }
    .rc-col-right table { width: 100%; border-collapse: collapse; font-size: 8pt; }
    .rc-col-right th, .rc-col-right td { border: 1px solid #999; padding: 2px 4px; text-align: center; }
    .rc-col-right th { background: #e8e8e8; font-weight: 700; }

    /* Student info block */
    .rc-stu-block { display: grid; grid-template-columns: 1fr 1fr; gap: 2px 16px; font-size: 9.5pt; border: 1px solid #bbb; padding: 6px 10px; margin-bottom: 5px; background: #fdfdfd; }
    .rc-stu-row { display: flex; gap: 4px; padding: 1px 0; }
    .rc-stu-lbl { font-weight: 700; min-width: 100px; flex-shrink: 0; }

    /* Exam header */
    .rc-exam-hdr { text-align: center; font-size: 11pt; font-weight: 700; background: #000; color: #fff; padding: 4px; margin-bottom: 0; }

    /* Marks table */
    .rc-marks-tbl { width: 100%; border-collapse: collapse; font-size: 8.5pt; margin-bottom: 5px; }
    .rc-marks-tbl th { background: #333; color: #fff; padding: 4px 5px; text-align: center; border: 1px solid #555; font-weight: 600; font-size: 8pt; }
    .rc-marks-tbl th.lft { text-align: left; padding-left: 6px; }
    .rc-marks-tbl td { padding: 3px 5px; border: 1px solid #bbb; text-align: center; vertical-align: middle; }
    .rc-marks-tbl tbody tr:nth-child(even) { background: #f7f7f7; }
    .sn { text-align: left !important; padding-left: 6px !important; font-weight: 500; }
    .rc-marks-tbl tfoot td { background: #333; color: #fff; font-weight: 700; border: 1px solid #555; padding: 4px 5px; }
    .cat-row td { background: #e8e8e8 !important; font-weight: 700; text-align: center; font-size: 8pt; }

    /* Bottom section */
    .rc-bottom { display: grid; grid-template-columns: 1fr auto; gap: 10px; margin-top: 5px; align-items: start; }
    .rc-summary-box { border: 1px solid #bbb; font-size: 8.5pt; }
    .rc-summary-box table { width: 100%; border-collapse: collapse; }
    .rc-summary-box td { padding: 4px 8px; border-bottom: 1px solid #e0e0e0; vertical-align: top; }
    .rc-summary-box td:first-child { font-weight: 600; width: 140px; }
    .rc-summary-box tr:last-child td { border-bottom: none; }
    .rc-qr-center { display: flex; flex-direction: column; align-items: center; justify-content: flex-start; gap: 4px; padding: 6px; border: 1px solid #bbb; background: #fafafa; }
    .qr-placeholder { width: 80px; height: 80px; background: #ddd; display: flex; align-items: center; justify-content: center; font-size: 7pt; color: #888; text-align: center; }
    .qr-lbl { font-size: 7.5pt; color: #444; font-weight: 600; text-align: center; font-family: 'Inter', sans-serif; }

    /* Remark */
    .rc-remark { margin-top: 5px; padding: 6px 10px; border: 1.5px solid #bbb; font-size: 9.5pt; min-height: 32px; }

    /* Signature row */
    .rc-sign-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-top: 14px; padding-top: 6px; border-top: 1px solid #ccc; }
    .rc-sign-box { text-align: center; }
    .rc-sign-line { height: 40px; border-bottom: 1px solid #555; margin-bottom: 4px; }
    .rc-sign-lbl { font-size: 8pt; color: #555; }

    /* Footer note */
    .rc-gen-note { font-size: 7pt; color: #888; text-align: center; margin-top: 6px; padding-top: 5px; border-top: 1px dashed #ccc; }
    .rc-ts-note { text-align: center; font-size: 7pt; color: #999; margin-top: 4px; border-top: 1px dashed #ddd; padding-top: 4px; }

    /* Print toolbar */
    .print-bar { width: 100%; max-width: 820px; display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
    .btn { padding: 9px 20px; border-radius: 6px; border: none; cursor: pointer; font-family: 'Inter', sans-serif; font-size: .82rem; font-weight: 600; display: inline-flex; align-items: center; gap: 6px; transition: all .15s; text-decoration: none; }
    .btn-primary { background: var(--navy); color: #fff; }
    .btn-primary:hover { background: var(--navy2); }
    .btn-gold { background: var(--gold); color: #fff; }
    .btn-gold:hover { background: var(--gold2); }
    .verified-badge { display: inline-flex; align-items: center; gap: 6px; background: #f0fdf4; color: var(--green); border: 1px solid #bbf7d0; border-radius: 20px; padding: 5px 14px; font-size: .78rem; font-weight: 600; margin-left: auto; }
    .fail-badge { background: #fef2f2; color: var(--red); border-color: #fecaca; }

    @media print {
      body { background: #fff; padding: 0; }
      .print-bar { display: none; }
      .rc-page { box-shadow: none; }
    }
    @media (max-width: 600px) {
      .rc-college-hdr { grid-template-columns: 80px 1fr 90px; gap: 4px; }
      .rc-stu-block { grid-template-columns: 1fr; }
      .rc-bottom { grid-template-columns: 1fr; }
      .rc-sign-row { grid-template-columns: 1fr; }
      .rc-page { padding: 4mm 3mm; font-size: 9pt; }
    }
  </style>
</head>
<body>

  <!-- Loading state -->
  <div id="state-loading">
    <div class="spinner"></div>
    <div class="state-txt">Loading result summary…</div>
  </div>

  <!-- Error state -->
  <div id="state-error" style="display:none;">
    <div class="err-icon"></div>
    <div class="err-msg" id="err-msg-text">Result not found.</div>
    <div class="err-sub">Please check the QR code or contact the college administration.</div>
  </div>

  <!-- Result card -->
  <div id="state-result">
    <div class="print-bar no-print">
      <button class="btn btn-primary" onclick="window.print()"> Print</button>
      <button class="btn btn-gold" id="btn-pdf" onclick="downloadPDF()">Download PDF</button>
      <span class="verified-badge" id="result-badge"> Verified Result</span>
    </div>
    <div class="rc-page" id="rc-printable">
      <!-- Populated by JS -->
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const sid  = params.get('sid')  || '';
    const exam = params.get('exam') || '';

    const API_BASE = window.location.origin;

    function showError(msg) {
      document.getElementById('state-loading').style.display = 'none';
      document.getElementById('state-error').style.display   = 'flex';
      document.getElementById('err-msg-text').textContent     = msg || 'Result not found.';
    }

    function grade(m) {
      if (m >= 80) return 'A+';
      if (m >= 70) return 'A';
      if (m >= 60) return 'A-';
      if (m >= 50) return 'B';
      if (m >= 40) return 'C';
      if (m >= 33) return 'D';
      return 'F';
    }

    function ord(n) { return n + (n === 1 ? 'st' : n === 2 ? 'nd' : n === 3 ? 'rd' : 'th'); }

    function renderResult(data) {
      const stu  = data.student;
      const rows = data.subject_rows;
      const passed = data.passed;
      const avg    = typeof data.gpa === 'number' ? data.gpa.toFixed(2) : data.gpa;
      const grpLabel = stu.group === 'Business' ? 'Business Studies' : stu.group;
      const ey  = data.exam_year || stu.session || stu.year || '';
      const ts  = new Date().toLocaleString('en-GB', {day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:true});
      const photoBlock = stu.photo
        ? `<img src="${stu.photo}" class="rc-stu-photo" alt="Photo" onerror="this.style.display='none'">`
        : `<div class="rc-stu-photo-ph">Photo<br>Not<br>Available</div>`;

      // Build subject rows HTML
      let tableRows = '';
      // Group rows by category — we'll show a separator for group subjects
      let inGroupSubs = false;
      rows.forEach(row => {
        const isGroupSub = !['101','102','107','108','275'].includes(row.code);
        if (isGroupSub && !inGroupSubs) {
          tableRows += `<tr class="cat-row"><td colspan="9">Group Subjects</td></tr>`;
          inGroupSubs = true;
        }
        const absent = row.absent;
        // A subject row is highlighted red when:
        //  - the student got an F grade (total < 33), OR
        //  - any component (CQ/MCQ/Practical) individually failed its pass mark
        //    (sub_passed === false, as set by the backend)
        const subFailed = !row.absent && (row.lg === 'F' || row.sub_passed === false);
        const failStyle = subFailed && !row.is_optional ? 'background:#fff8f8;' : '';
        const lgStyle   = subFailed && !row.is_optional ? 'color:#b91c1c;font-weight:700;' : 'font-weight:700;';
        const optBadge  = row.is_optional ? ' <span style="font-size:7pt;color:#0d2b45;background:#e8f4f8;padding:1px 4px;border-radius:2px;">(Optional)</span>' : '';
        const pracCell  = row.has_prac
          ? (absent ? 'A' : (row.prac !== null ? row.prac : '0'))
          : '—';
        const highCell  = absent ? '—' : (row.highest > 0 ? row.highest : '—');

        tableRows += `<tr style="${failStyle}">
          <td class="sn">${row.name}${optBadge} <span style="font-size:7pt;color:#888;">${row.code}</span></td>
          <td>100</td>
          <td>${absent ? 'A' : (row.cq !== '' ? row.cq : '0')}</td>
          <td>${absent ? 'A' : (row.mcq !== '' ? row.mcq : '0')}</td>
          <td>${pracCell}</td>
          <td style="font-weight:600;">${absent ? '0' : row.total}</td>
          <td style="color:#1e3a8a;font-weight:600;">${highCell}</td>
          <td>${absent ? '0.00' : row.gpa.toFixed(2)}</td>
          <td style="${lgStyle}">${row.lg}</td>
        </tr>`;
      });

      const summaryHtml = `
      <div class="rc-summary-box"><table>
        <tr><td><strong>Total Marks Obtained</strong></td><td style="font-weight:700;">${data.total_mark} out of ${data.max_mark}</td></tr>
        <tr><td>GPA</td><td style="font-weight:700;">${avg}</td></tr>
        <tr><td>Result</td><td style="font-weight:700;${passed?'color:#166534;':'color:#b91c1c;'}">${passed?'PASS':'FAIL'}</td></tr>
        <tr><td>Optional Subject</td><td style="font-size:8pt;">${data.optional_label || 'N/A'}</td></tr>
        <tr><td>Merit Position</td><td style="font-weight:600;color:#1e3a8a;">${data.merit_position ? ord(data.merit_position) + ' out of ' + data.merit_total : 'N/A'}</td></tr>
      </table></div>`;

      const qrPlaceholder = `<div class="rc-qr-center">
        <div class="qr-placeholder">QR Verified</div>
        <div class="qr-lbl">Scan QR Code</div>
      </div>`;

      document.getElementById('rc-printable').innerHTML = `
        <div class="rc-college-hdr">
          <div class="rc-col-left">${photoBlock}<div class="rc-stu-photo-lbl">Candidate's Photo</div></div>
          <div class="rc-col-mid">
            <h1>MOINUDDIN ADARSHA MOHILA COLLEGE</h1>
            <img src="https://www.muamc.edu.bd/wp-content/uploads/2025/01/logo-muam-scaled.jpeg" class="rc-college-logo" alt="Logo">
            <p>Shamimabad, Bagbari, Sylhet.</p>
            <span class="transcript-lbl">Academic Transcript</span>
          </div>
          <div class="rc-col-right">
            <table>
              <tr><th>Range</th><th>LG</th><th>GPA</th></tr>
              <tr><td>80-100</td><td>A+</td><td>5.0</td></tr>
              <tr><td>70-79</td><td>A</td><td>4.0</td></tr>
              <tr><td>60-69</td><td>A-</td><td>3.5</td></tr>
              <tr><td>50-59</td><td>B</td><td>3.0</td></tr>
              <tr><td>40-49</td><td>C</td><td>2.0</td></tr>
              <tr><td>33-39</td><td>D</td><td>1.0</td></tr>
              <tr><td>0-32</td><td>F</td><td>0.0</td></tr>
            </table>
          </div>
        </div>
        <div class="rc-stu-block">
          <div class="rc-stu-row"><div class="rc-stu-lbl">Student Name</div><div>: ${(window.escHtml||(x=>x))(stu.name)}</div></div>
          <div class="rc-stu-row"><div class="rc-stu-lbl">Father's Name</div><div>: ${(window.escHtml||(x=>x))(stu.father) || 'N/A'}</div></div>
          <div class="rc-stu-row"><div class="rc-stu-lbl">Mother's Name</div><div>: ${(window.escHtml||(x=>x))(stu.mother) || 'N/A'}</div></div>
          <div class="rc-stu-row"><div class="rc-stu-lbl">Class</div><div>: ${(window.escHtml||(x=>x))(stu.cls)}</div></div>
          <div class="rc-stu-row"><div class="rc-stu-lbl">Roll Number</div><div>: ${(window.escHtml||(x=>x))(stu.roll)}</div></div>
          <div class="rc-stu-row"><div class="rc-stu-lbl">Registration</div><div>: ${(window.escHtml||(x=>x))(stu.reg) || 'N/A'}</div></div>
          <div class="rc-stu-row"><div class="rc-stu-lbl">Group</div><div>: ${grpLabel}</div></div>
          <div class="rc-stu-row"><div class="rc-stu-lbl">Examination</div><div>: ${data.exam_type} ${ey}</div></div>
        </div>
        <div class="rc-exam-hdr">${data.exam_type} Examination ${ey}</div>
        <table class="rc-marks-tbl">
          <thead>
            <tr>
              <th class="lft">Subject</th>
              <th>Total</th><th>CQ</th><th>MCQ</th><th>Practical</th>
              <th>Total</th><th>Highest Mark</th><th>GPA</th><th>LG</th>
            </tr>
          </thead>
          <tbody>${tableRows}</tbody>
          <tfoot>
            <tr>
              <td style="text-align:left;padding-left:6px;"><strong>Total GPA &amp; Result</strong></td>
              <td></td><td></td><td></td><td></td>
              <td style="font-weight:600;">${data.total_mark}/${data.max_mark}</td>
              <td></td>
              <td style="font-weight:700;">${avg}</td>
              <td style="font-weight:700;">${passed ? '<span style="color:#dcfce7;">Pass</span>' : '<span style="color:#fecaca;">Fail</span>'}</td>
            </tr>
          </tfoot>
        </table>
        <div class="rc-bottom">
          ${summaryHtml}
          ${qrPlaceholder}
        </div>
        <div class="rc-remark"><strong>Remark:</strong>&nbsp;</div>
        <div class="rc-sign-row">
          <div class="rc-sign-box"><div class="rc-sign-line"></div><div class="rc-sign-lbl">Class Teacher</div></div>
          <div class="rc-sign-box"><div class="rc-sign-line"></div><div class="rc-sign-lbl">Guardian</div></div>
          <div class="rc-sign-box"><div class="rc-sign-line"></div><div class="rc-sign-lbl">Principal</div></div>
        </div>
        <div class="rc-gen-note">Result Generated by AMS Portal &mdash; Moinuddin Adarsha Mohila College, Shamimabad, Bagbari, Sylhet.</div>
        <div class="rc-ts-note">Date &amp; Time of Printing: ${ts}</div>
      `;

      // Update badge
      const badge = document.getElementById('result-badge');
      if (!passed) {
        badge.textContent = '✘ Result: FAIL';
        badge.classList.add('fail-badge');
      } else {
        badge.textContent = '✔ Result: PASS';
      }

      // Show result
      document.getElementById('state-loading').style.display = 'none';
      document.getElementById('state-result').style.display  = 'block';
      document.title = `Result — ${stu.name} | MAMC`;
    }

    async function fetchResult() {
      if (!sid) { showError('No student ID provided in the URL.'); return; }
      try {
        const url = `${API_BASE}/api/public/result-summary?sid=${encodeURIComponent(sid)}&exam=${encodeURIComponent(exam)}`;
        const res = await fetch(url);
        const data = await res.json();
        if (!data.ok) { showError(data.message || 'Result not found.'); return; }
        renderResult(data);
      } catch (err) {
        showError('Failed to load result. Please check your connection.');
      }
    }

    function downloadPDF() {
      const el = document.getElementById('rc-printable');
      if (!el) return;
      html2pdf().set({
        margin: [0,0,0,0],
        filename: `Result_${sid}.pdf`,
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2.5, useCORS: true, letterRendering: true, logging: false, windowWidth: 794 },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
      }).from(el).save();
    }

    fetchResult();
  </script>
</body>
</html>
